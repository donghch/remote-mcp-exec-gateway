# OpenClaw Remote Broker MCP - Security Policy
# Version: 2.0
# All commands are allowed by default (blacklist model).
# Only banned commands are blocked. Commands in confirmation_required need user consent.

policy:
  # Banned Commands — explicitly blocked from execution
  banned_commands:
    - name: "rm"
      reason: "Destructive file deletion — use file tools instead"
    - name: "rmdir"
      reason: "Destructive directory deletion"
    - name: "dd"
      reason: "Raw disk operations — risk of data loss"
    - name: "mkfs"
      reason: "Filesystem formatting — destructive"
    - name: "fdisk"
      reason: "Disk partitioning — destructive"
    - name: "shutdown"
      reason: "System shutdown"
    - name: "reboot"
      reason: "System reboot"
    - name: "kill"
      reason: "Use kill_process tool instead"
    - name: "pkill"
      reason: "Use kill_process tool instead"
    - name: "killall"
      reason: "Use kill_process tool instead"
    - name: "chmod"
      reason: "Permission changes not allowed"
    - name: "chown"
      reason: "Ownership changes not allowed"
    - name: "sudo"
      reason: "Privilege escalation not allowed"
    - name: "su"
      reason: "Privilege escalation not allowed"

  # Confirmation Required — allowed but need explicit user consent
  confirmation_required:
    - name: "python3"
      reason: "Can execute arbitrary code"
    - name: "python"
      reason: "Can execute arbitrary code"
    - name: "pip"
      reason: "Can install arbitrary packages"
    - name: "pip3"
      reason: "Can install arbitrary packages"
    - name: "curl"
      reason: "Can download arbitrary content"
    - name: "wget"
      reason: "Can download arbitrary content"
    - name: "nc"
      reason: "Network operations"
    - name: "ncat"
      reason: "Network operations"
    - name: "ssh"
      reason: "Remote access"
    - name: "scp"
      reason: "Remote file transfer"
    - name: "rsync"
      reason: "Remote file sync"

  # Command Overrides — optional per-command restrictions
  command_overrides:
    git:
      max_args: 20
      allowed_prefixes:
        - "status"
        - "log"
        - "diff"
        - "clone"
        - "pull"
        - "fetch"
        - "add"
        - "commit"
        - "checkout"
        - "branch"
        - "stash"
        - "remote"
        - "show"
        - "branch"
        - "tag"
    find:
      max_args: 15

  # Path Restrictions
  # All file operations must stay within allowed paths.
  # Sessions now default to the user's home directory.
  allowed_paths:
    - "~//**"                       # User's home directory and all subdirectories
    - "/home/**"                    # All user home directories
    - "/tmp/**"                     # Temporary files

  blocked_paths:
    - "**/.ssh/**"
    - "**/.gnupg/**"
    - "**/.aws/**"
    - "**/.env"

  # File Transfer Limits
  file_limits:
    max_read_size: 10485760      # 10MB
    max_write_size: 52428800     # 50MB
    blocked_extensions:
      - ".exe"
      - ".dll"
      - ".so"

  # Default Resource Limits (applied via cgroups v2)
  resource_limits:
    cpu_quota_us: 100000         # 100% of one core
    cpu_period_us: 100000
    memory_max: "536870912"      # 512MB
    pids_max: 32
    io_weight: 100

  # Confirmation Gates
  confirmation_gates:
    destructive_operations: true
    command_with_overrides: true
